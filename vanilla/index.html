<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Artistry | The Best Portfolio Platform for Visual Artists</title>
  <meta name="description" content="Escape the algorithm. Artistry is the ad-free portfolio platform built for artists to showcase concept art, 3D renders, and illustrations with deep context.">
  <meta name="robots" content="index, follow">
  <meta name="author" content="Artistry">
  <meta name="theme-color" content="#0F172A">
  <link rel="canonical" href="https://artistry.app/">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Artistry">
  <meta property="og:title" content="Artistry | The Best Portfolio Platform for Visual Artists">
  <meta property="og:description" content="Escape the algorithm. Artistry is the ad-free portfolio platform built for artists to showcase concept art, 3D renders, and illustrations with deep context.">
  <meta property="og:url" content="https://artistry.app/">
  <meta property="og:locale" content="en_US">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Artistry | The Best Portfolio Platform for Visual Artists">
  <meta name="twitter:description" content="Escape the algorithm. Artistry is the ad-free portfolio platform built for artists to showcase concept art, 3D renders, and illustrations with deep context.">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://artistry.app/#website",
        "url": "https://artistry.app/",
        "name": "Artistry",
        "description": "The narrative portfolio platform for visual artists — showcase art with context, hire talent, and commission work without the algorithm.",
        "publisher": { "@id": "https://artistry.app/#organization" },
        "inLanguage": "en-US",
        "potentialAction": {
          "@type": "SearchAction",
          "target": { "@type": "EntryPoint", "urlTemplate": "https://artistry.app/feed?q={search_term_string}" },
          "query-input": "required name=search_term_string"
        }
      },
      {
        "@type": "Organization",
        "@id": "https://artistry.app/#organization",
        "name": "Artistry",
        "url": "https://artistry.app/",
        "description": "Ad-free portfolio and discovery platform for digital artists, illustrators, and 3D creators.",
        "sameAs": []
      }
    ]
  }
  </script>
  
  <!-- Tailwind CSS via CDN with custom config -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary': '#F25C54',
            'primary-hover': '#D93830',
            'coral': {
              DEFAULT: '#F25C54',
              dark: '#D93830',
              light: '#FF7B73'
            }
          },
          backgroundColor: {
            'primary': '#F25C54',
            'primary-hover': '#D93830'
          },
          textColor: {
            'primary': '#F25C54'
          },
          borderColor: {
            'primary': '#F25C54'
          }
        }
      },
      safelist: [
        'bg-primary',
        'bg-primary-hover',
        'hover:bg-primary',
        'hover:bg-primary-hover',
        'text-primary',
        'hover:text-primary',
        'border-primary',
        'focus:border-primary',
        'ring-primary',
        'focus:ring-primary'
      ]
    }
  </script>
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Debug Script -->
  <script>
    console.log('HTML loaded');
    window.addEventListener('error', (e) => {
      console.error('Error:', e.message, e.filename, e.lineno, e.colno, e.error);
    });
  </script>
</head>
<body class="text-white" style="background-color: #0F172A;">
  <!-- App Container -->
  <div id="app">
    <!-- Loading indicator -->
    <div class="flex items-center justify-center min-h-screen" id="loading">
      <div class="text-center">
        <div class="spinner mx-auto mb-4"></div>
        <p style="color: #94A3B8;">Loading Artistry...</p>
      </div>
    </div>
  </div>
  
  <!-- Optional: production domain + share image for SEO (before app.js)
  <script>window.__ARTISTRY_SITE_ORIGIN__='https://www.yourdomain.com';window.__ARTISTRY_OG_IMAGE__='https://www.yourdomain.com/og-image.jpg';</script>
  -->
  <!-- Main App Script (ES6 Module) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
